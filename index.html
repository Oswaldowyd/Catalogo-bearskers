<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Bearskers</title>
<style>
  :root{--bg:#ede8e0;--card:#faf7f2;--sidebar:#111;--accent:#111;--text:#1a1a1a;--muted:#888;--border:#d9d2c7;--radius:12px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);}
  .layout{display:flex;min-height:100vh;}
  /* Sidebar */
  .sidebar{width:230px;min-width:230px;background:var(--sidebar);color:#ccc;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:100;transition:transform .3s;}
  .logo{padding:20px 18px 14px;border-bottom:1px solid #2a2a2a;}
  .logo h1{font-size:18px;font-weight:800;color:#f0ebe3;letter-spacing:1px;}
  .logo p{font-size:11px;color:#777;margin-top:3px;}
  .sidebar-section{padding:14px 0 6px;}
  .sidebar-label{font-size:9px;font-weight:700;letter-spacing:2px;color:#555;text-transform:uppercase;padding:0 18px 6px;}
  .cat-btn{display:block;width:100%;text-align:left;padding:9px 18px;background:none;border:none;border-left:3px solid transparent;color:#aaa;font-size:12.5px;cursor:pointer;transition:all .15s;}
  .cat-btn:hover{background:rgba(255,255,255,.06);color:#f0ebe3;}
  .cat-btn.active{background:rgba(240,235,227,.12);color:#f0ebe3;border-left-color:#f0ebe3;font-weight:600;}
  .cat-count{float:right;background:rgba(255,255,255,.08);border-radius:10px;padding:1px 6px;font-size:10px;}
  .chevron{float:right;font-style:normal;font-size:10px;margin-left:4px;transition:transform .2s;display:inline-block;}
  .brand-btn.open .chevron{transform:rotate(90deg);}
  .sub-list{display:none;padding-bottom:4px;}
  .sub-list.open{display:block;}
  .sub-btn{display:block;width:100%;text-align:left;padding:7px 18px 7px 28px;background:none;border:none;border-left:3px solid transparent;color:#888;font-size:12px;cursor:pointer;transition:all .15s;}
  .sub-btn:hover{background:rgba(255,255,255,.04);color:#f0ebe3;}
  .sub-btn.active{color:#f0ebe3;border-left-color:#f0ebe3;font-weight:600;background:rgba(240,235,227,.08);}
  /* Main */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;}
  .topbar{background:#faf7f2;padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
  .menu-btn{display:none;background:none;border:none;font-size:20px;cursor:pointer;}
  .search-wrap{flex:1;position:relative;max-width:440px;}
  .search-wrap input{width:100%;padding:9px 14px 9px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:#fff;transition:border .2s;}
  .search-wrap input:focus{border-color:#111;}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#999;font-size:13px;}
  .topbar-info{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .current-cat{font-size:15px;font-weight:700;}
  .prod-count{font-size:12px;color:var(--muted);}
  .filter-fotos{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap;}
  /* Grid */
  .grid-area{padding:20px;flex:1;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
  /* Card */
  .card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);cursor:pointer;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;}
  .card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.12);}
  .card-img{position:relative;aspect-ratio:1;background:#f0f0f0;overflow:hidden;}
  .card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .4s;}
  .card-img img.on{opacity:1;}
  .card-img img.off{opacity:0;}
  .no-img{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,#2a2a2a,#111);color:#aaa;font-size:11px;}
  .no-img span{font-size:28px;}
  .dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;}
  .dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4);transition:background .3s;}
  .dot.on{background:#fff;}
  .badge{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.5);color:#fff;font-size:10px;padding:2px 6px;border-radius:9px;}
  .card-body{padding:11px;flex:1;display:flex;flex-direction:column;gap:7px;}
  .card-name{font-size:12.5px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card-price{font-size:14px;font-weight:700;color:#111;}
  .card-price.empty{color:var(--muted);font-size:12px;font-weight:400;}
  .card-actions{display:flex;gap:7px;margin-top:auto;}
  .btn-wa{flex:1;padding:7px;background:#25d366;color:#fff;border:none;border-radius:7px;font-size:11.5px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;transition:background .15s;}
  .btn-wa:hover{background:#1da851;}
  .btn-more{padding:7px 10px;background:var(--bg);border:1.5px solid var(--border);border-radius:7px;font-size:11.5px;cursor:pointer;white-space:nowrap;}
  .btn-more:hover{border-color:#111;color:#111;}
  /* Sentinel / loader */
  .sentinel{text-align:center;padding:24px;color:var(--muted);font-size:12px;}
  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
  .modal-bg.open{opacity:1;pointer-events:all;}
  .modal{background:#faf7f2;border-radius:16px;width:92vw;max-width:820px;max-height:93vh;overflow:hidden;display:flex;flex-direction:column;}
  .modal-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
  .modal-title{font-size:14px;font-weight:700;flex:1;line-height:1.4;}
  .close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#999;flex-shrink:0;}
  .modal-body{display:flex;flex:1;overflow:hidden;min-height:300px;}
  .modal-main{flex:1;background:#f0f0f0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .modal-main img{max-width:100%;max-height:54vh;object-fit:contain;}
  .modal-main .no-img{position:static;flex:1;align-self:stretch;}
  .modal-thumbs{width:100px;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px;border-left:1px solid var(--border);}
  .thumb{width:82px;height:82px;border-radius:6px;overflow:hidden;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .thumb.on{border-color:#111;}
  .modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .modal-price{font-size:20px;font-weight:800;color:#111;flex:1;}
  .modal-price.empty{font-size:13px;color:var(--muted);font-weight:400;}
  .modal-note{font-size:11px;color:var(--muted);}
  .btn-wa-lg{padding:10px 20px;background:#25d366;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
  .btn-yupoo{padding:10px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;font-size:12px;cursor:pointer;text-decoration:none;color:var(--text);}
  /* Empty */
  .empty{text-align:center;padding:60px;color:var(--muted);}
  /* Mobile */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:98;}
  @media(max-width:680px){
    .sidebar{position:fixed;left:0;top:0;height:100vh;transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .overlay.open{display:block;}
    .menu-btn{display:block;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
    .grid-area{padding:10px;}
    .modal-thumbs{width:75px;}
    .thumb{width:60px;height:60px;}
  }
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="logo"><h1>🐻 Bearskers</h1><p>Catálogo de calzado premium</p></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Categorías</div>
      <button class="cat-btn active" onclick="setCategory('all',event)">Todos <span class="cat-count" id="cnt-all">0</span></button>
      <div id="cat-list"></div>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="search" type="text" placeholder="Buscar modelo, marca, color..." oninput="render()">
      </div>
<div class="topbar-info">
        <span class="current-cat" id="cat-label">Todos</span>
        <span class="prod-count" id="prod-count"></span>
      </div>
    </div>
    <div class="grid-area">
      <div class="grid" id="grid"></div>
      <div class="sentinel" id="sentinel" style="display:none">Cargando más…</div>
      <div class="empty" id="empty" style="display:none"><p>🔍 No se encontraron productos</p></div>
    </div>
  </div>
</div>
<!-- Modal -->
<div class="modal-bg" id="modal-bg" onclick="closeModalOnBg(event)">
  <div class="modal">
    <div class="modal-head"><div class="modal-title" id="m-title"></div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="modal-main" id="m-main"><img id="m-img" src="" referrerpolicy="no-referrer"></div>
      <div class="modal-thumbs" id="m-thumbs"></div>
    </div>
    <div class="modal-foot">
      <div><div class="modal-price" id="m-price"></div><div class="modal-note">Escríbenos para precio y tallas disponibles</div></div>
      <a id="m-wa" href="#" target="_blank" class="btn-wa-lg">💬 WhatsApp</a>
    </div>
  </div>
</div>
<script src="imgs-locales.js"></script>
<script src="productos.js"></script>
<script src="precios.js" onerror=""></script>
<script>
const WA = "526699201472"; // ← Cambia esto por tu número WhatsApp (solo dígitos, con código de país)
const BATCH = 24;       // productos por lote al hacer scroll

// PRECIOS (opcional): crea precios.js con  const PRECIOS = {"103634284":"S/ 250", ...}
const PRICES = (typeof PRECIOS !== "undefined") ? PRECIOS : {};

// Imágenes locales descargadas con descargar-imagenes.js
function getImgs(p) {
  const loc = (typeof IMGS_LOCALES !== "undefined") ? IMGS_LOCALES[String(p.id)] : null;
  return (loc && loc.length) ? loc : [];
}
function getPrice(p) { return PRICES[String(p.id)] || p.price || ""; }

const BRANDS = [
  { label:"Nike / Jordan", icon:"👟", cats:["Ofertas 🔥","Air Jordan 1 High","Air Jordan 1 Mid","Air Jordan 1 Low","Air Jordan 2 / 3","Air Jordan 4","AJ4 RM / AJ312","Air Jordan 5","Air Jordan 6","Air Jordan 8–23","Air Jordan 11","Air Jordan 12","Air Jordan 13","Nike Dunk","Air Force 1","Nike Running","Basketball (Kobe/LeBron/Foam)"] },
  { label:"Adidas / Yeezy", icon:"🦴", cats:["Adidas","Yeezy"] },
  { label:"New Balance", icon:"🔵", cats:["New Balance"] },
  { label:"Vans", icon:"🛹", cats:["Vans"] },
  { label:"Bape / Puma / MLB", icon:"🐍", cats:["Bape / MLB / Puma"] },
  { label:"Balenciaga", icon:"🏷️", cats:["Balenciaga"] },
  { label:"Lujo", icon:"👑", cats:["Lujo (LV/Dior/OW/Gucci)"] },
  { label:"HOKA / On / ASICS", icon:"🏃", cats:["HOKA / On / ASICS"] },
  { label:"UGG / Outdoor", icon:"🥾", cats:["UGG / Botas / Outdoor"] },
  { label:"Niños / Sandalias", icon:"👧", cats:["Niños / Sandalias"] },
];

let curCat = "all", curSearch = "", shown = 0, curItems = [];

function brandCount(brand) {
  return brand.cats.reduce((s,c) => s + PRODUCTS.filter(p=>p.cat===c).length, 0);
}
function catCount(cat) { return PRODUCTS.filter(p=>p.cat===cat).length; }

function buildSidebar() {
  document.getElementById("cnt-all").textContent = PRODUCTS.length;
  document.getElementById("cat-list").innerHTML = BRANDS.map((brand,bi) => {
    const total = brandCount(brand);
    const subs = brand.cats.map(c => {
      const n = catCount(c);
      return `<button class="sub-btn" onclick="setCategory('cat:${c.replace(/'/g,"\\'")}',event)">${c} <span class="cat-count">${n}</span></button>`;
    }).join("");
    return `<button class="cat-btn brand-btn" onclick="toggleBrand(${bi},this)">${brand.icon} ${brand.label} <span class="cat-count">${total}</span><i class="chevron">›</i></button>
<div class="sub-list" id="sub-${bi}">${subs}</div>`;
  }).join("");
}

function toggleBrand(bi, btn) {
  const sub = document.getElementById("sub-"+bi);
  const isOpen = sub.classList.contains("open");
  // Cerrar todos
  document.querySelectorAll(".sub-list").forEach(s=>s.classList.remove("open"));
  document.querySelectorAll(".brand-btn").forEach(b=>b.classList.remove("open"));
  if (!isOpen) { sub.classList.add("open"); btn.classList.add("open"); }
  // Seleccionar la marca completa
  setCategory("brand:"+BRANDS[bi].label, null, BRANDS[bi].label);
}

function setCategory(cat, e, label) {
  if (e) e.stopPropagation();
  curCat = cat;
  document.querySelectorAll(".cat-btn,.sub-btn").forEach(b=>b.classList.remove("active"));
  if (cat === "all") {
    document.querySelector(".cat-btn[onclick*=\"'all'\"]").classList.add("active");
    document.getElementById("cat-label").textContent = "Todos";
    document.querySelectorAll(".sub-list").forEach(s=>s.classList.remove("open"));
    document.querySelectorAll(".brand-btn").forEach(b=>b.classList.remove("open"));
  } else if (cat.startsWith("brand:")) {
    document.getElementById("cat-label").textContent = label || cat.slice(6);
  } else {
    // cat individual
    const catName = cat.slice(4);
    document.getElementById("cat-label").textContent = catName;
    document.querySelectorAll(".sub-btn").forEach(b=>{ if(b.textContent.trim().startsWith(catName)) b.classList.add("active"); });
  }
  render();
  window.scrollTo({top:0});
}

function filtered() {
  const q = curSearch.toLowerCase();
  const soloFotos = false;
  let allowedCats = null;
  if (curCat.startsWith("brand:")) {
    const bl = curCat.slice(6);
    const brand = BRANDS.find(b=>b.label===bl);
    allowedCats = brand ? brand.cats : [];
  } else if (curCat.startsWith("cat:")) {
    allowedCats = [curCat.slice(4)];
  }
  return PRODUCTS.filter(p =>
    (curCat==="all" || allowedCats.includes(p.cat)) &&
    (!q||p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q)) &&
    (!soloFotos||getImgs(p).length>0)
  );
}

function cardHTML(p) {
  const srcs = getImgs(p);
  let media;
  if (srcs.length) {
    const imgs = srcs.map((u,i) => `<img ${i===0?`src="${u}"`:`data-src="${u}"`} class="${i===0?"on":"off"}" loading="lazy" alt="">`).join("");
    const dots = srcs.length>1 ? `<div class="dots">${srcs.map((_,i)=>`<span class="dot${i===0?" on":""}"></span>`).join("")}</div>` : "";
    media = `${imgs}${dots}<span class="badge">📷 ${srcs.length}</span>`;
  } else {
    media = `<div class="no-img"><span>👟</span>Fotos en Yupoo</div>`;
  }
  const price = getPrice(p) ? `<div class="card-price">${getPrice(p)}</div>` : ``;
  const waMsg = encodeURIComponent("Hola! Me interesa este modelo: "+p.name+" (ref "+p.id+")");
  return `<div class="card" onclick="openModal(${p.id})" onmouseenter="startSlide(${p.id},this)" onmouseleave="stopSlide(${p.id},this)">
    <div class="card-img">${media}</div>
    <div class="card-body">
      <div class="card-name">${p.name}</div>${price}
      <div class="card-actions">
        <a class="btn-wa" href="https://wa.me/${WA.replace(/[^0-9]/g,"")}?text=${waMsg}" target="_blank" onclick="event.stopPropagation()">💬 Lo quiero</a>
        <button class="btn-more">Ver más</button>
      </div>
    </div>
  </div>`;
}

function render() {
  curSearch = document.getElementById("search").value;
  curItems = filtered();
  shown = 0;
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  document.getElementById("prod-count").textContent = curItems.length + " producto" + (curItems.length!==1?"s":"");
  grid.innerHTML = "";
  if (!curItems.length) { empty.style.display="block"; document.getElementById("sentinel").style.display="none"; return; }
  empty.style.display="none";
  loadMore();
}

function loadMore() {
  const grid = document.getElementById("grid");
  const slice = curItems.slice(shown, shown+BATCH);
  grid.insertAdjacentHTML("beforeend", slice.map(cardHTML).join(""));
  shown += slice.length;
  document.getElementById("sentinel").style.display = shown < curItems.length ? "block" : "none";
}

// Scroll infinito
new IntersectionObserver(entries => {
  if (entries[0].isIntersecting && shown < curItems.length) loadMore();
}, {rootMargin:"600px"}).observe(document.getElementById("sentinel"));

// Image slideshow on hover
const timers = {};
function startSlide(id, el) {
  const imgs = el.querySelectorAll(".card-img img");
  if (imgs.length<2) return;
  imgs.forEach(im=>{ if(im.dataset.src){im.src=im.dataset.src; delete im.dataset.src;} });
  let i=0;
  timers[id] = setInterval(()=>{
    imgs.forEach(im=>im.classList.replace("on","off"));
    const dots = el.querySelectorAll(".dot");
    dots.forEach(d=>d.classList.remove("on"));
    i=(i+1)%imgs.length;
    imgs[i].classList.replace("off","on");
    if(dots[i]) dots[i].classList.add("on");
  }, 900);
}
function stopSlide(id, el) {
  clearInterval(timers[id]);
  const imgs=el.querySelectorAll(".card-img img"), dots=el.querySelectorAll(".dot");
  imgs.forEach((im,i)=>{im.classList.remove("on","off"); im.classList.add(i===0?"on":"off");});
  dots.forEach((d,i)=>{d.classList.toggle("on",i===0);});
}

// Modal
let curP = null;
function openModal(id) {
  curP = PRODUCTS.find(p=>p.id===id);
  if (!curP) return;
  curP._imgs = getImgs(curP);
  document.getElementById("m-title").textContent = curP.name;
  const main = document.getElementById("m-main");
  if (curP._imgs.length) {
    main.innerHTML = `<img id="m-img" src="${curP._imgs[0]}" referrerpolicy="no-referrer">`;
  } else {
    main.innerHTML = `<div class="no-img"><span>👟</span>Fotos disponibles en Yupoo →</div>`;
  }
  const price = getPrice(curP);
  document.getElementById("m-price").textContent = price||"Consultar precio";
  document.getElementById("m-price").className = "modal-price"+(price?"":" empty");
  const waMsg = encodeURIComponent("Hola! Me interesa: "+curP.name+" (ref "+curP.id+")");
  document.getElementById("m-wa").href = `https://wa.me/${WA.replace(/[^0-9]/g,"")}?text=${waMsg}`;
  document.getElementById("m-thumbs").innerHTML = curP._imgs.map((u,i)=>
    `<div class="thumb${i===0?" on":""}" onclick="selectThumb(${i})"><img src="${u}"></div>`
  ).join("");
  document.getElementById("m-thumbs").style.display = curP._imgs.length ? "flex" : "none";
  document.getElementById("modal-bg").classList.add("open");
  document.body.style.overflow="hidden";
}
function selectThumb(i) {
  document.getElementById("m-img").src = curP._imgs[i];
  document.querySelectorAll(".thumb").forEach((t,j)=>t.classList.toggle("on",j===i));
}
function closeModal() { document.getElementById("modal-bg").classList.remove("open"); document.body.style.overflow=""; }
function closeModalOnBg(e) { if(e.target.id==="modal-bg") closeModal(); }

document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("open");
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

buildSidebar();
render();
</script>
</body>
</html>
